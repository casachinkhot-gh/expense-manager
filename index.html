<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Expenses">
  <meta name="theme-color" content="#F2F2F7">
  <title>Expense Manager</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-icon">💰</div>
      <h1>Expense Manager</h1>
      <div class="form-group" style="text-align:left">
        <label>Email</label>
        <input id="login-email" type="email" value="casachinkhot@gmail.com" autocomplete="email">
      </div>
      <div class="form-group" style="text-align:left">
        <label>Password</label>
        <input id="login-password" type="password" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <p id="login-error" style="color:#FF3B30;font-size:13px;margin-bottom:12px;display:none"></p>
      <button onclick="signIn()" class="google-btn">Sign In</button>
      <p class="login-note">Your data syncs automatically across all devices.</p>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <div id="content"></div>
    <nav id="tab-bar">
      <button class="tab-btn active" data-tab="dashboard">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">Dashboard</span>
      </button>
      <button class="tab-btn" data-tab="transactions">
        <span class="tab-icon">📋</span>
        <span class="tab-label">Transactions</span>
      </button>
      <button class="tab-btn" data-tab="assets">
        <span class="tab-icon">🏦</span>
        <span class="tab-label">Assets</span>
      </button>
      <button class="tab-btn" data-tab="networth">
        <span class="tab-icon">💰</span>
        <span class="tab-label">Net Worth</span>
      </button>
      <button class="tab-btn" data-tab="trips">
        <span class="tab-icon">🧳</span>
        <span class="tab-label">Trips</span>
      </button>
      <button class="tab-btn" data-tab="settings">
        <span class="tab-icon">⚙️</span>
        <span class="tab-label">Settings</span>
      </button>
    </nav>
  </div>

  <!-- Bottom-sheet modal -->
  <div id="modal-overlay" class="hidden">
    <div id="modal-container">
      <div id="modal-header">
        <button id="modal-cancel">Cancel</button>
        <h3 id="modal-title"></h3>
        <button id="modal-save">Save</button>
      </div>
      <div id="modal-body"></div>
    </div>
  </div>

  <!-- SheetJS for Excel export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
